services:
  web:
    image: acxcoldblood/dnotes:${IMAGE_TAG}
    restart: always
    env_file:
      - .env
    expose:
      - "5000"
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
    volumes:
      - uploads_data:/app/static/uploads

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web

volumes:
  uploads_data:
