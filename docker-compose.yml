services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: acxcoldblood/dnotes:${IMAGE_TAG}
    restart: always
    env_file:
      - .env
    expose:
      - "5000"
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
    volumes:
      - uploads_data:/app/static/uploads

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

  certbot:
    image: certbot/certbot:latest
    container_name: devops-certbot
    profiles:
      - certbot
    volumes:
      - /home/ubuntu/letsencrypt:/etc/letsencrypt
    entrypoint: >
      sh -c "pip install --no-cache-dir certbot-dns-duckdns &&
      certbot certonly --non-interactive --agree-tos
      --email ${LETSENCRYPT_EMAIL}
      --authenticator dns-duckdns --dns-duckdns-credentials /etc/letsencrypt/duckdns.ini
      -d dnotes.duckdns.org"

volumes:
  mysql_data:
  uploads_data:
